<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen ❤️</title>
    <style>
        /* Define Colors and Ethereal Theme */
        :root {
            --accent-pink: #ffafcc;
            --soft-glow: #ffc8dd;
            --deep-royal-blue: #000c24; /* Background Base */
            --shimmer-blue: #021a4d;     /* Flowy Glow */
            --text-gold: #fcf6bd;
            --glass: rgba(255, 255, 255, 0.08);
            --borde-glass: rgba(255, 255, 255, 0.2);
        }

        /* 1. Glowy and Tulip Background (The Vibe) */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif; /* Smooth Modern Font */
            color: var(--text-gold);
            overflow: hidden;

            /* Base Dark Blue to Light Blue Radial Glow */
            background-color: var(--deep-royal-blue);
            background-image: 
                radial-gradient(at 50% 50%, var(--shimmer-blue) 0px, transparent 50%),
                radial-gradient(at 10% 10%, #0d0033 0px, transparent 40%),
                radial-gradient(at 90% 90%, #0a012a 0px, transparent 40%);

            position: relative;
        }

        /* Stylized Flowy Tulips (As an SVG overlay) */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><pattern id="tulips" patternUnits="userSpaceOnUse" width="150" height="150"><path d="M75 10 C 65 30, 85 30, 75 50 C 60 70, 90 70, 75 90 S 60 110, 75 130" stroke="%23ffafcc" stroke-opacity="0.2" fill="none" stroke-width="2"/><path d="M110 30 C 100 50, 120 50, 110 70 C 95 90, 125 90, 110 110 S 95 130, 110 150" stroke="%23ffafcc" stroke-opacity="0.15" fill="none" stroke-width="1.5"/><path d="M40 5 C 30 25, 50 25, 40 45 C 25 65, 55 65, 40 85 S 25 105, 40 125" stroke="%23ffc8dd" stroke-opacity="0.1" fill="none" stroke-width="1.2"/></pattern><rect width="100%" height="100%" fill="url(%23tulips)"/></svg>');
            z-index: 1;
            opacity: 0.6;
        }

        /* 2. Glassmorphism Card (The Smoothness) */
        #main-card {
            text-align: center;
            padding: 40px;
            backdrop-filter: blur(15px); /* Smooth blur behind the card */
            background: var(--glass);
            border-radius: 30px;
            border: 1px solid var(--borde-glass);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 450px;
            z-index: 10;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            animation: cardFadeIn 0.8s forwards ease-out; /* Smooth arrival */
        }

        @keyframes cardFadeIn {
            to { transform: scale(1); opacity: 1; }
        }

        h1 { font-size: 2.2rem; color: var(--accent-pink); text-shadow: 0 0 15px var(--soft-glow); margin-bottom: 10px; }
        p { color: white; line-height: 1.6; font-size: 1.1rem; margin-bottom: 30px; }

        /* 3. The Interactive Buttons (The Persuasion) */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            position: relative;
            height: 60px;
            z-index: 20;
        }

        button {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s ease; /* Smooth hover and moves */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Yes Button Styling and Pulsing Glow */
        #yesBtn {
            background: linear-gradient(45deg, #12fff7, #1eff9d);
            color: #002e2c;
            animation: pulseGlow 2s infinite;
        }

        /* No Button Styling */
        #noBtn {
            background-color: var(--accent-pink);
            color: #4c001b;
            position: relative;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(30, 255, 157, 0.5); }
            50% { box-shadow: 0 0 20px rgba(30, 255, 157, 0.9); }
            100% { box-shadow: 0 0 5px rgba(30, 255, 157, 0.5); }
        }

        /* 4. The Opening "Pop" (Custom Smooth Modal) */
        #initial-popup {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s, visibility 0.5s;
        }

        #initial-popup.visible {
            opacity: 1;
            visibility: visible;
        }

        #initial-popup-content {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--borde-glass);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: var(--accent-pink);
            transform: scale(0.8);
            transition: transform 0.4s ease-out;
        }

        #initial-popup.visible #initial-popup-content {
            transform: scale(1);
        }

        #initial-popup p { font-size: 1.3rem; }

        /* 5. The Final Screen (Full Screen Shimmer) */
        #final-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #0077b6; /* Lighter blue, but we'll add glow */
            background-image: 
                radial-gradient(at 10% 90%, #68b4e4 0px, transparent 50%),
                radial-gradient(at 90% 10%, #03045e 0px, transparent 50%);
            color: white;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #final-screen.visible {
            display: flex;
            opacity: 1;
        }

        #final-screen h2 { font-size: 2rem; padding: 20px; text-shadow: 0 0 20px rgba(255,255,255,0.8); line-height: 1.4; }

    </style>
</head>
<body>

    <div id="initial-popup">
        <div id="initial-popup-content">
            <p>I'm sorry love, and I promise to make you happy and keep making you happy.</p>
            <button id="closePopup" onclick="closeStartPop()">Tap to Continue</button>
        </div>
    </div>

    <div id="main-card">
        <h1>Forgive me? 🥺</h1>
        <p>I messed up. I promise I'm going to make you happy and keep making you happy every single day.</p>
        
        <div class="button-container">
            <button id="yesBtn" onclick="showFinal()">Yes</button>
            <button id="noBtn" onclick="handleNo()">No</button>
        </div>
    </div>

    <div id="final-screen">
        <h2>I love you and will do forever and ever... <br><br> Forgive me baby... <br><br> I’ll be the best man. ❤️</h2>
    </div>

    <script>
        // 1. Show smooth popup on load (instead of harsh alert)
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('initial-popup').classList.add('visible');
            }, 500); // 0.5s delay before it pops
        };

        function closeStartPop() {
            document.getElementById('initial-popup').classList.remove('visible');
        }

        // 2. Button Logic (Persuasion Game)
        let noCount = 0;
        const noBtn = document.getElementById('noBtn');

        function handleNo() {
            noCount++;
            
            // Temporary text change (turn Yes)
            noBtn.innerText = "Yes";
            
            // Check if she reached 10 taps
            if (noCount >= 10) {
                showFinal();
                return;
            }

            // Move the button smoothly to a new spot she has to chase
            const cardRect = document.getElementById('main-card').getBoundingClientRect();
            // Restrict movement near the card area so it doesn't fly off screen entirely
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 60);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.zIndex = '30'; // Ensure it's above other elements

            // Reset text back to No after a split second
            setTimeout(() => {
                noBtn.innerText = "No";
            }, 400); // Slower, smoother reset
        }

        // 3. The final blue shimmer transition
        function showFinal() {
            const finalScreen = document.getElementById('final-screen');
            finalScreen.style.display = 'flex'; // Need flex to align, then fade
            setTimeout(() => {
                finalScreen.classList.add('visible');
            }, 100);
        }
    </script>
</body>
</html>
